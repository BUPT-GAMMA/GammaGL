name: Build and Test

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          submodules: 'recursive'

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install base dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install pybind11 ninja

      - name: Install package
        run: |
          GAMMAGL_WITH_CUDA=0 pip install -e ".[dev]" --no-build-isolation

      - name: Run checks
        run: |
          TL_BACKEND=torch python -m compileall -q gammagl tests examples
          TL_BACKEND=torch python -m pytest tests/test_public_api.py tests/data tests/utils -q
